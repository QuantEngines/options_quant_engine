[pytest]
# NOISE: urllib3 complains about macOS LibreSSL instead of OpenSSL — env noise,
#        cannot be fixed in this codebase.
# RISK warnings are intentionally NOT filtered so they surface in CI / local runs.
markers =
    replay_soak: deterministic replay-soak coverage for bounded CI-friendly replay loops
filterwarnings =
    ignore::urllib3.exceptions.NotOpenSSLWarning
